<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Not found · CIPP</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; base-uri 'none'; form-action 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests"
    />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f77f00" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <style>
      :root { --brand: #f77f00; --bg: #f7f8fa; --ink: #1c2733; --muted: #5b6b7b; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0d1117; --ink: #e6edf3; --muted: #9aa7b4; }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center; text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 480px at 80% -10%, rgba(247, 127, 0, 0.14), transparent 60%),
          var(--bg);
        padding: 24px;
      }
      .code {
        font-size: clamp(4rem, 18vw, 8rem); font-weight: 800; letter-spacing: -0.04em;
        background: linear-gradient(92deg, #f77f00, #fcbf49);
        -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1;
      }
      h1 { font-size: 1.4rem; margin: 8px 0 6px; }
      p { color: var(--muted); margin: 0 0 22px; }
      a {
        display: inline-block; padding: 11px 20px; border-radius: 10px;
        background: var(--brand); color: #1c1200; font-weight: 650; text-decoration: none;
      }
      a:hover { background: #fcbf49; }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you’re looking for doesn’t exist on this site.</p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
